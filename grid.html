<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link
            href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
            rel="stylesheet"
    />
    <link rel="stylesheet" href="grid.css">
    <title>Document</title>
</head>
<body>
<main id="main-section">
        <div id="grid-container">
                <div class="box a">BOX 1</div>
                <div class="box b"><img src="grid-image-2.jpg" alt="image-2 here"></div>
                <div class="box c"><img src="grid-image-3.webp" alt="image-3 here"></div>
                <div class="box d"><i class="ri-facebook-circle-fill"></i></div>
                <div class="box e"><i class="ri-twitter-x-line"></i></div>
                <div class="box f"><i class="ri-instagram-line"></i></div>
                <div class="box g"><i class="ri-linkedin-box-fill"></i></div>
                <div class="box h"><i class="ri-dribbble-line"></i></div>
                <div class="box i"><i class="ri-behance-line"></i></div>
                <div class="box j">BOX 10</div>
                <div class="box k"><img src="grid-image-5.jpg" alt="Image-5 here"></div>
                <div class="box l">BOX 12</div>
                <div class="box m"><img src="grid-image-4.webp" alt="image-4 here"></div>
                <div class="box n">BOX 14</div>
                <div class="box o">BOX 15</div>
                <div class="box p">BOX 16</div>
        </div>
</main>
    <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    })(window.location);
  </script>
</body>
</html>
